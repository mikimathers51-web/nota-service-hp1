<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Trigger Build</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; opacity: 0.9; margin-bottom: 30px; font-size: 14px; }
        
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            color: #333;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            text-align: center;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .steps {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        .steps h3 { margin-bottom: 15px; color: #333; }
        .step {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            color: #555;
            font-size: 14px;
        }
        .step-number {
            width: 28px;
            height: 28px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Nota Service HP</h1>
        <p class="subtitle">Build APK dari HP</p>
        
        <div class="card">
            <!-- GANTI dengan URL repo Anda -->
            <a href="https://github.com/USERNAME/REPO/actions/workflows/build-android-debug.yml" 
               class="btn btn-primary">
                🚀 Trigger Build
            </a>
            
            <a href="https://github.com/USERNAME/REPO/actions" 
               class="btn btn-secondary">
                📊 Lihat Status
            </a>
        </div>
        
        <div class="card steps">
            <h3>📋 Cara Build:</h3>
            <div class="step">
                <div class="step-number">1</div>
                <div>Tap "Trigger Build"</div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div>Tap "Run workflow"</div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div>Tunggu 3-5 menit</div>
            </div>
            <div class="step">
                <div class="step-number">4</div>
                <div>Download APK</div>
            </div>
        </div>
    </div>
</body>
</html>
