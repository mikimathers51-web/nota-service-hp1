name: 📱 Build Android Debug APK (Capacitor 7)

on:
  workflow_dispatch:
    inputs:
      build_notes:
        description: '📝 Catatan build'
        required: false
        type: string
        default: 'Build Capacitor 7'
  
  push:
    branches: [main, master]

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ Setup Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4096m" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties

      # ==========================================
      # STEP 1: Create package.json dengan echo
      # ==========================================
      - name: 📝 Create package.json
        run: |
          echo '{' > package.json
          echo '  "name": "nota-service-hp",' >> package.json
          echo '  "version": "2.0.0",' >> package.json
          echo '  "description": "Nota Service HP - Capacitor 7",' >> package.json
          echo '  "main": "index.html",' >> package.json
          echo '  "scripts": {' >> package.json
          echo '    "build": "mkdir -p www && cp src/index.html www/index.html"' >> package.json
          echo '  },' >> package.json
          echo '  "dependencies": {' >> package.json
          echo '    "@capacitor/android": "^7.0.0",' >> package.json
          echo '    "@capacitor/core": "^7.0.0",' >> package.json
          echo '    "@capacitor/camera": "^7.0.0",' >> package.json
          echo '    "@capacitor/filesystem": "^7.0.0",' >> package.json
          echo '    "@capacitor/share": "^7.0.0",' >> package.json
          echo '    "@capacitor/splash-screen": "^7.0.0",' >> package.json
          echo '    "@capacitor/status-bar": "^7.0.0",' >> package.json
          echo '    "@capacitor-community/contacts": "^7.0.0",' >> package.json
          echo '    "@capacitor-community/bluetooth-le": "^7.0.0"' >> package.json
          echo '  },' >> package.json
          echo '  "devDependencies": {' >> package.json
          echo '    "@capacitor/cli": "^7.0.0"' >> package.json
          echo '  }' >> package.json
          echo '}' >> package.json
          
          cat package.json

      # ==========================================
      # STEP 2: Install dependencies
      # ==========================================
      - name: 📦 Install dependencies
        run: |
          npm install
          npm install -g @capacitor/cli@^7.0.0

      # ==========================================
      # STEP 3: Prepare www directory
      # ==========================================
      - name: 🏗️ Prepare www directory
        run: |
          mkdir -p www
          
          if [ -f "src/index.html" ]; then
            cp src/index.html www/index.html
            echo "✅ src/index.html copied"
          else
            echo "❌ src/index.html not found!"
            exit 1
          fi

      # ==========================================
      # STEP 4: Create capacitor.config.json dengan echo
      # ==========================================
      - name: 🔧 Create capacitor.config.json
        run: |
          echo '{' > capacitor.config.json
          echo '  "appId": "com.notaservicehp.app",' >> capacitor.config.json
          echo '  "appName": "Nota Service HP",' >> capacitor.config.json
          echo '  "webDir": "www",' >> capacitor.config.json
          echo '  "server": {' >> capacitor.config.json
          echo '    "androidScheme": "https",' >> capacitor.config.json
          echo '    "cleartext": true' >> capacitor.config.json
          echo '  },' >> capacitor.config.json
          echo '  "plugins": {' >> capacitor.config.json
          echo '    "SplashScreen": {' >> capacitor.config.json
          echo '      "launchShowDuration": 2000,' >> capacitor.config.json
          echo '      "backgroundColor": "#667eea",' >> capacitor.config.json
          echo '      "showSpinner": true,' >> capacitor.config.json
          echo '      "spinnerColor": "#ffffff"' >> capacitor.config.json
          echo '    }' >> capacitor.config.json
          echo '  }' >> capacitor.config.json
          echo '}' >> capacitor.config.json
          
          cat capacitor.config.json

      # ==========================================
      # STEP 5: Add Android Platform
      # ==========================================
      - name: 🤖 Add Android Platform
        run: |
          rm -rf android
          npx cap add android@^7.0.0
          
          if [ ! -d "android" ]; then
            echo "❌ Failed to create android directory"
            exit 1
          fi
          
          echo "✅ Android platform created"

      # ==========================================
      # STEP 6: Inject Permissions
      # ==========================================
      - name: 🔐 Inject Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          if [ ! -f "$MANIFEST" ]; then
            echo "❌ AndroidManifest.xml not found"
            find android -name "AndroidManifest.xml"
            exit 1
          fi
          
          cp "$MANIFEST" "$MANIFEST.bak"
          
          # Hapus </manifest> terakhir
          sed -i '/^<\/manifest>$/d' "$MANIFEST"
          
          # Tambah permissions
          echo '' >> "$MANIFEST"
          echo '    <!-- Contacts Plugin -->' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.READ_CONTACTS" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.WRITE_CONTACTS" />' >> "$MANIFEST"
          echo '' >> "$MANIFEST"
          echo '    <!-- Bluetooth Plugin -->' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.BLUETOOTH" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' >> "$MANIFEST"
          echo '' >> "$MANIFEST"
          echo '</manifest>' >> "$MANIFEST"
          
          echo "✅ Permissions injected"
          cat "$MANIFEST"

      # ==========================================
      # STEP 7: Sync Capacitor
      # ==========================================
      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      # ==========================================
      # STEP 8: Build APK
      # ==========================================
      - name: 🔨 Build Debug APK
        run: |
          cd android
          ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: 🔍 Verify APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully"
            ls -lh "$APK_PATH"
            echo "size_bytes=$(stat -c%s "$APK_PATH")" >> $GITHUB_ENV
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-v7
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
