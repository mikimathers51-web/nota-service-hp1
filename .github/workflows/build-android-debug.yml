name: 📱 Build Android Debug APK (Capacitor 7)

on:
  workflow_dispatch:
    inputs:
      build_notes:
        description: '📝 Catatan build'
        required: false
        type: string
        default: 'Build Capacitor 7'
  
  push:
    branches: [main, master]

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ==========================================
      # PERBAIKAN 1: Setup Gradle Properties
      # ==========================================
      - name: ⚙️ Setup Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties

      # ==========================================
      # PERBAIKAN 2: Create package.json dengan benar
      # ==========================================
      - name: 📝 Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "nota-service-hp",
            "version": "2.0.0",
            "description": "Nota Service HP - Capacitor 7",
            "main": "index.html",
            "scripts": {
              "build": "mkdir -p www && cp src/index.html www/index.html",
              "cap:sync": "npx cap sync android"
            },
            "dependencies": {
              "@capacitor/android": "^7.0.0",
              "@capacitor/core": "^7.0.0",
              "@capacitor/camera": "^7.0.0",
              "@capacitor/filesystem": "^7.0.0",
              "@capacitor/share": "^7.0.0",
              "@capacitor/splash-screen": "^7.0.0",
              "@capacitor/status-bar": "^7.0.0",
              "@capacitor-community/contacts": "^7.0.0",
              "@capacitor-community/bluetooth-le": "^7.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^7.0.0"
            }
          }
          EOF

      - name: 📦 Install dependencies
        run: |
          npm install
          npm install --save-dev @capacitor/cli@^7.0.0

      # ==========================================
      # PERBAIKAN 3: Prepare www dengan benar
      # ==========================================
      - name: 🏗️ Prepare www directory
        run: |
          mkdir -p www
          if [ -f "src/index.html" ]; then
            cp src/index.html www/index.html
            echo "✅ src/index.html copied"
          else
            echo "❌ src/index.html not found!"
            ls -la
            exit 1
          fi
          
          # Copy capacitor.config.json ke www
          if [ -f "capacitor.config.json" ]; then
            cp capacitor.config.json www/
          fi

      # ==========================================
      # PERBAIKAN 4: Clean install Android
      # ==========================================
      - name: 🧹 Clean & Add Android Platform
        run: |
          rm -rf android
          npx cap add android@^7.0.0

      # ==========================================
      # PERBAIKAN 5: Inject permissions dengan benar
      # ==========================================
      - name: 🔐 Inject Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # Backup
          cp "$MANIFEST" "$MANIFEST.bak"
          
          # Hapus permission lama
          sed -i '/READ_CONTACTS/d' "$MANIFEST"
          sed -i '/WRITE_CONTACTS/d' "$MANIFEST"
          sed -i '/BLUETOOTH/d' "$MANIFEST"
          sed -i '/LOCATION/d' "$MANIFEST"
          
          # Inject permissions sebelum </manifest>
          python3 << 'PYEOF'
          import re

          with open("android/app/src/main/AndroidManifest.xml", "r") as f:
              content = f.read()

          permissions = '''    <!-- Contacts -->
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.WRITE_CONTACTS" />
              
              <!-- Bluetooth -->
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              
          </manifest>'''

          content = re.sub(r'</manifest>', permissions, content)

          with open("android/app/src/main/AndroidManifest.xml", "w") as f:
              f.write(content)

          print("✅ Permissions injected")
          PYEOF

          cat "$MANIFEST"

      # ==========================================
      # PERBAIKAN 6: Sync dengan verbose
      # ==========================================
      - name: 🔄 Sync Capacitor
        run: |
          npx cap sync android --verbose 2>&1 | tee sync.log || {
            echo "❌ Sync failed"
            cat sync.log
            exit 1
          }

      # ==========================================
      # PERBAIKAN 7: Build dengan clean
      # ==========================================
      - name: 🔨 Build Debug APK
        run: |
          cd android
          
          # Clean dulu
          ./gradlew clean --no-daemon
          
          # Build dengan no-daemon untuk menghindari memory issue
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log || {
            echo "❌ Build failed"
            tail -200 build.log
            exit 1
          }

      - name: 🔍 Verify APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully"
            ls -lh "$APK_PATH"
            echo "size_bytes=$(stat -c%s "$APK_PATH")" >> $GITHUB_ENV
          else
            echo "❌ APK not found"
            find android -name "*.apk" 2>/dev/null
            exit 1
          fi

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-v7
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📝 Build Summary
        run: |
          SIZE_MB=$((${{ env.size_bytes }} / 1024 / 1024))
          echo "## ✅ Build Success!" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Capacitor | 7.x |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY
