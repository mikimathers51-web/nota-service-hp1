name: 📱 Build Android Debug APK (Capacitor 7)

on:
  workflow_dispatch:
    inputs:
      build_notes:
        description: '📝 Catatan build'
        required: false
        type: string
        default: 'Build Capacitor 7'
  
  push:
    branches: [main, master]

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ Setup Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties

      # ==========================================
      # STEP 1: Create package.json
      # ==========================================
      - name: 📝 Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "nota-service-hp",
            "version": "2.0.0",
            "description": "Nota Service HP - Capacitor 7",
            "main": "index.html",
            "scripts": {
              "build": "mkdir -p www && cp src/index.html www/index.html"
            },
            "dependencies": {
              "@capacitor/android": "^7.0.0",
              "@capacitor/core": "^7.0.0",
              "@capacitor/camera": "^7.0.0",
              "@capacitor/filesystem": "^7.0.0",
              "@capacitor/share": "^7.0.0",
              "@capacitor/splash-screen": "^7.0.0",
              "@capacitor/status-bar": "^7.0.0",
              "@capacitor-community/contacts": "^7.0.0",
              "@capacitor-community/bluetooth-le": "^7.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^7.0.0"
            }
          }
          EOF

      # ==========================================
      # STEP 2: Install dependencies
      # ==========================================
      - name: 📦 Install dependencies
        run: |
          npm install
          npm install -g @capacitor/cli@^7.0.0

      # ==========================================
      # STEP 3: Prepare www directory
      # ==========================================
      - name: 🏗️ Prepare www directory
        run: |
          mkdir -p www
          
          # Copy index.html
          if [ -f "src/index.html" ]; then
            cp src/index.html www/index.html
            echo "✅ src/index.html copied"
          else
            echo "❌ src/index.html not found!"
            ls -la
            exit 1
          fi
          
          # Copy capacitor.config.json
          if [ -f "capacitor.config.json" ]; then
            cp capacitor.config.json www/
            echo "✅ capacitor.config.json copied"
          else
            echo "⚠️ capacitor.config.json not found, creating default"
            cat > www/capacitor.config.json << 'EOF'
            {
              "appId": "com.notaservicehp.app",
              "appName": "Nota Service HP",
              "webDir": "www"
            }
            EOF
          fi
          
          ls -la www/

      # ==========================================
      # STEP 4: Initialize Capacitor config (jika belum ada)
      # ==========================================
      - name: 🔧 Initialize Capacitor Config
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            cat > capacitor.config.json << 'EOF'
            {
              "appId": "com.notaservicehp.app",
              "appName": "Nota Service HP",
              "webDir": "www",
              "server": {
                "androidScheme": "https",
                "cleartext": true
              },
              "plugins": {
                "SplashScreen": {
                  "launchShowDuration": 2000,
                  "backgroundColor": "#667eea",
                  "showSpinner": true,
                  "spinnerColor": "#ffffff"
                }
              }
            }
            EOF
          fi

      # ==========================================
      # STEP 5: Add Android Platform (PENTING!)
      # ==========================================
      - name: 🤖 Add Android Platform
        run: |
          # Hapus android lama jika ada
          rm -rf android
          
          # Add platform android
          npx cap add android@^7.0.0 2>&1 | tee add-android.log
          
          # Verifikasi
          if [ ! -d "android" ]; then
            echo "❌ Failed to create android directory"
            cat add-android.log
            exit 1
          fi
          
          echo "✅ Android platform created"
          ls -la android/

      # ==========================================
      # STEP 6: Inject Permissions (SETELAH android dibuat)
      # ==========================================
      - name: 🔐 Inject Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # Cek file ada
          if [ ! -f "$MANIFEST" ]; then
            echo "❌ AndroidManifest.xml not found at $MANIFEST"
            find android -name "AndroidManifest.xml" 2>/dev/null
            exit 1
          fi
          
          echo "✅ Found AndroidManifest.xml"
          cat "$MANIFEST"
          
          # Backup
          cp "$MANIFEST" "$MANIFEST.bak"
          
          # Inject permissions menggunakan sed
          sed -i '/<\/manifest>/d' "$MANIFEST"
          
          cat >> "$MANIFEST" << 'EOF'
          
              <!-- Contacts Plugin -->
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.WRITE_CONTACTS" />
              
              <!-- Bluetooth Plugin -->
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              
          </manifest>
          EOF
          
          echo "✅ Permissions injected"
          cat "$MANIFEST"

      # ==========================================
      # STEP 7: Sync Capacitor
      # ==========================================
      - name: 🔄 Sync Capacitor
        run: |
          npx cap sync android 2>&1 | tee sync.log || {
            echo "❌ Sync failed"
            cat sync.log
            exit 1
          }

      # ==========================================
      # STEP 8: Build APK
      # ==========================================
      - name: 🔨 Build Debug APK
        run: |
          cd android
          ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log || {
            echo "❌ Build failed"
            tail -100 build.log
            exit 1
          }

      - name: 🔍 Verify APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully"
            ls -lh "$APK_PATH"
            echo "size_bytes=$(stat -c%s "$APK_PATH")" >> $GITHUB_ENV
          else
            echo "❌ APK not found"
            find android -name "*.apk" 2>/dev/null
            exit 1
          fi

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-v7
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
