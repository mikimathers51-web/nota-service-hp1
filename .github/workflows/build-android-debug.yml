name: 📱 Build Android Debug APK

on:
  workflow_dispatch:
    inputs:
      build_notes:
        description: '📝 Catatan build (opsional)'
        required: false
        type: string
        default: 'Build dari HP'
  
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - '.github/workflows/**'

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📝 Fix package.json (Vite + Official Contacts + Camera)
        run: |
          cat > package.json << 'EOF'
          {
            "name": "nota-service-hp",
            "version": "1.0.0",
            "description": "Nota Service HP - Android Debug",
            "main": "index.html",
            "scripts": {
              "build": "vite build",
              "cap:add": "cap add android",
              "cap:sync": "cap sync",
              "cap:open": "cap open android",
              "build:debug": "npm run build && cap sync android && cd android && ./gradlew assembleDebug",
              "install:apk": "adb install android/app/build/outputs/apk/debug/app-debug.apk"
            },
            "dependencies": {
              "@capacitor/android": "^5.7.0",
              "@capacitor/core": "^5.7.0",
              "@capacitor/camera": "^5.0.9",
              "@capacitor/filesystem": "^5.0.7",
              "@capacitor/share": "^5.0.7",
              "@capacitor/splash-screen": "^5.0.7",
              "@capacitor/status-bar": "^5.0.7",
              "@capacitor-community/contacts": "^5.0.0",
              "@capacitor-community/bluetooth-le": "^3.1.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^5.7.0",
              "vite": "^5.4.2"
            }
          }
          EOF

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build dengan Vite (www)
        run: npm run build

      - name: 🧹 Clean & Add Android Platform
        run: |
          rm -rf android 2>/dev/null || true
          npx cap add android

      - name: 🔐 Inject Android Permissions (Contacts) - Safety
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # Inject READ_CONTACTS
          if ! grep -q "READ_CONTACTS" "$MANIFEST"; then
            sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.READ_CONTACTS" \/>\n<\/manifest>/' "$MANIFEST"
            echo "✅ READ_CONTACTS permission added"
          fi
          
          # Inject WRITE_CONTACTS
          if ! grep -q "WRITE_CONTACTS" "$MANIFEST"; then
            sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.WRITE_CONTACTS" \/>\n<\/manifest>/' "$MANIFEST"
            echo "✅ WRITE_CONTACTS permission added"
          fi
          
          echo "=== AndroidManifest.xml setelah inject ==="
          cat "$MANIFEST"

      - name: 🔄 Sync Capacitor (with Contacts + Camera)
        run: npx cap sync android

      - name: 🔨 Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: 🔍 Verify APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully"
            ls -lh "$APK_PATH"
            echo "size_bytes=$(stat -c%s "$APK_PATH")" >> $GITHUB_ENV
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: 📤 Upload APK (Latest)
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-latest
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📤 Upload APK (Versioned)
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: 📝 Build Summary
        run: |
          SIZE_MB=$((${{ env.size_bytes }} / 1024 / 1024))
          echo "## 📱 Build Success!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Notes | ${{ github.event.inputs.build_notes || 'Auto build' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 APK Size | ${SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| ⬇️ Download | Artifacts di atas |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📲 Cara Download dari HP:" >> $GITHUB_STEP_SUMMARY
          echo "1. Tap 'Artifacts' section di atas" >> $GITHUB_STEP_SUMMARY
          echo "2. Pilih 'nota-service-hp-latest'" >> $GITHUB_STEP_SUMMARY
          echo "3. Download APK" >> $GITHUB_STEP_SUMMARY
