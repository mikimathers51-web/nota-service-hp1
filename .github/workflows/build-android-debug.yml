name: 📱 Build Android Debug APK

on:
  workflow_dispatch:
    inputs:
      build_notes:
        description: '📝 Catatan build (opsional)'
        required: false
        type: string
        default: 'Build dari HP'
  
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - '.github/workflows/**'

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Prepare www directory
        run: |
          mkdir -p www
          if [ -f "src/index.html" ]; then
            cp src/index.html www/index.html
            echo "✅ Using src/index.html"
          else
            echo "❌ src/index.html not found!"
            echo "   Please add your HTML file to src/index.html"
            exit 1
          fi
          ls -la www/

      - name: 🔨 Add Android Platform (if needed)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: 🔨 Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: 🔍 Verify APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully"
            ls -lh "$APK_PATH"
            echo "size_bytes=$(stat -c%s "$APK_PATH")" >> $GITHUB_ENV
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: 📤 Upload APK (Latest)
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-latest
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📤 Upload APK (Versioned)
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: 📝 Build Summary
        run: |
          SIZE_MB=$((${{ env.size_bytes }} / 1024 / 1024))
          echo "## 📱 Build Success!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Notes | ${{ github.event.inputs.build_notes || 'Auto build' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 APK Size | ${SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| ⬇️ Download | Artifacts di atas |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📲 Cara Download dari HP:" >> $GITHUB_STEP_SUMMARY
          echo "1. Tap 'Artifacts' section di atas" >> $GITHUB_STEP_SUMMARY
          echo "2. Pilih 'nota-service-hp-latest'" >> $GITHUB_STEP_SUMMARY
          echo "3. Download APK" >> $GITHUB_STEP_SUMMARY
