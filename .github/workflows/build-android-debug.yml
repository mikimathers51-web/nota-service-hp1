name: 📱 Build Android Debug APK (Capacitor 7)

on:
  workflow_dispatch:
    inputs:
      build_notes:
        description: '📝 Catatan build (opsional)'
        required: false
        type: string
        default: 'Build dengan Contacts v7'
  
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - '.github/workflows/**'

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ==========================================
      # PACKAGE.JSON DENGAN V7
      # ==========================================
      - name: 📝 Create package.json (Capacitor 7)
        run: |
          cat > package.json << 'EOF'
          {
            "name": "nota-service-hp",
            "version": "2.0.0",
            "description": "Nota Service HP - Capacitor 7",
            "main": "index.html",
            "scripts": {
              "build": "mkdir -p www && cp src/index.html www/index.html",
              "cap:add": "cap add android",
              "cap:sync": "cap sync",
              "cap:open": "cap open android"
            },
            "dependencies": {
              "@capacitor/android": "^7.0.0",
              "@capacitor/core": "^7.0.0",
              "@capacitor/camera": "^7.0.0",
              "@capacitor/filesystem": "^7.0.0",
              "@capacitor/share": "^7.0.0",
              "@capacitor/splash-screen": "^7.0.0",
              "@capacitor/status-bar": "^7.0.0",
              "@capacitor-community/contacts": "^7.0.0",
              "@capacitor-community/bluetooth-le": "^7.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^7.0.0"
            }
          }
          EOF

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Prepare www directory
        run: |
          mkdir -p www
          if [ -f "src/index.html" ]; then
            cp src/index.html www/index.html
            echo "✅ Using src/index.html"
          else
            echo "❌ src/index.html not found!"
            exit 1
          fi

      # ==========================================
      # CLEAN INSTALL ANDROID PLATFORM
      # ==========================================
      - name: 🧹 Clean & Add Android Platform (Capacitor 7)
        run: |
          rm -rf android
          npx cap add android

      # ==========================================
      # INJECT PERMISSIONS (V7 COMPATIBLE)
      # ==========================================
      - name: 🔐 Inject Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # Backup
          cp "$MANIFEST" "$MANIFEST.bak"
          
          # Hapus permission lama jika ada
          sed -i '/READ_CONTACTS/d' "$MANIFEST"
          sed -i '/WRITE_CONTACTS/d' "$MANIFEST"
          
          # Inject sebelum </manifest>
          sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.READ_CONTACTS" \/>\
              <uses-permission android:name="android.permission.WRITE_CONTACTS" \/>\
          <\/manifest>/' "$MANIFEST"
          
          echo "=== AndroidManifest.xml ==="
          cat "$MANIFEST"

      # ==========================================
      # SYNC CAPACITOR
      # ==========================================
      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: 🔨 Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: 🔍 Verify APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully"
            ls -lh "$APK_PATH"
            echo "size_bytes=$(stat -c%s "$APK_PATH")" >> $GITHUB_ENV
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: 📤 Upload APK (Latest)
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-latest-v7
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📤 Upload APK (Versioned)
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-build-${{ github.run_number }}-v7
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: 📝 Build Summary
        run: |
          SIZE_MB=$((${{ env.size_bytes }} / 1024 / 1024))
          echo "## 📱 Build Success! (Capacitor 7)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Capacitor | 7.x |" >> $GITHUB_STEP_SUMMARY
          echo "| 📇 Contacts | @capacitor-community/contacts v7 |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Notes | ${{ github.event.inputs.build_notes || 'Auto build' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 APK Size | ${SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY
